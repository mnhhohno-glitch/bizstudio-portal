# 実績ヒアリングの職種カテゴリ別プロンプト（追加実績ヒアリングロジック）
# achievement_category の選択値に応じて、メインプロンプト末尾に結合する

description: |
  PDFをAIで読み取り職務経歴書を作成するにあたり、
  実績の裏付けが不足している場合、
  achievement_category の選択値に応じて
  以下の質問を追加出力する。
  すべての質問に「回答：」を付与する。該当がない場合は空白可と明記。書き方例を必ず含める。文章を簡素化しない。

categories:
  営業・販売（数字を追う職種）:
    instruction: |
      売上または利益ベースで直近1～3年分を必ず確認する。
      年次推移が分かる形式で記載してもらう。
      数値は具体的に記載。
      該当がなければ空白で可。
    questions: |
      ① 直近1～3年間の目標数値と実績数値を教えてください
      （売上または利益で記載してください）

      ▼記入例
      20XX年 目標5,000万円／実績5,500万円
      20XX年 目標5,500万円／実績6,200万円
      20XX年 目標6,000万円／実績6,800万円

      回答：

      ② 直近1～3年間の平均達成率と、過去最高達成率を教えてください
      （最高達成時期も記載）

      ▼記入例
      平均達成率：112％
      最高達成率：135％（20XX年3月）

      回答：

      ③ 社内順位や受賞歴があれば教えてください
      （例：支店1位／全社上位10％／新人賞など）

      回答：

      ④ 新規・既存の割合と、担当顧客数を教えてください

      ▼記入例
      新規70％／既存30％
      担当顧客数：常時40社

      回答：

      ⑤ 商材単価・市場環境（競合状況など）を教えてください

      ▼記入例
      平均単価：80万円
      競合3～5社との相見積もりが常態化している市場

      回答：

      ⑥ 売上向上のために行った具体的な工夫を教えてください

      回答：

      ⑦ その工夫により改善した数値があれば教えてください
      （改善前 → 改善後 の形式で）

      ▼記入例
      契約率 15％ → 25％
      平均単価 60万円 → 80万円

      回答：

  事務・サポート職:
    instruction: |
      数値成果がない場合は改善・効率化・影響範囲を確認する。
      可能な限り改善前後を記載。
      該当がなければ空白可。
    questions: |
      ① 月間の担当件数を教えてください

      回答：

      ② 業務効率化により削減できた時間や工数があれば教えてください

      回答：

      ③ ミス削減や品質向上の実績があれば教えてください
      （改善前 → 改善後）

      回答：

      ④ マニュアル作成や業務改善提案の経験があれば教えてください

      回答：

      ⑤ 担当業務の影響範囲を教えてください
      （部署人数・全社規模など）

      回答：

  専門・技術職:
    instruction: |
      プロジェクト規模・成果・技術的貢献度を具体的に確認する。
      期間と数値があれば必ず記載。
      該当がなければ空白可。
    questions: |
      ① 直近1～3年で担当した主なプロジェクトを教えてください
      （規模・期間・役割を記載）

      回答：

      ② プロジェクトの成果や導入効果を教えてください
      （例：コスト削減○％、工期短縮○日など）

      回答：

      ③ 担当した業務範囲を教えてください
      （要件定義／設計／実装／保守など）

      回答：

      ④ 品質改善・生産性向上などの成果があれば教えてください
      （改善前 → 改善後）

      回答：

      ⑤ 技術的に評価された実績や表彰があれば教えてください

      回答：

  マネジメント職:
    instruction: |
      組織成果・育成・改善実績を確認する。
      チーム規模と成果は必須。
      該当がなければ空白可。
    questions: |
      ① 管理していたチーム人数を教えてください

      回答：

      ② チーム全体の売上・成果を教えてください
      （直近1～3年分あれば記載）

      回答：

      ③ チーム目標に対する達成率を教えてください

      回答：

      ④ 育成した部下の成果や昇進実績があれば教えてください

      回答：

      ⑤ 組織改善の取り組みと、その成果を教えてください
      （離職率改善・生産性向上など）

      回答：
