# インポートExcelファイルを作るプロンプト（正本）
# ※求職者へ応募書類を作るためのヒアリングプロンプトとは別です。

prompt:
  attachments:
    - name: 面談の通話文字起こしメモ
      description: 会話内容の文字起こしメモ

    - name: Web履歴書
      format: PDF
      description: |
        ファイル名に「5から始まる7桁の求職者ナンバー」を必ず含めること。
        条件を満たさない場合は処理を実行しない。

    - name: フラグリスト
      format: xlsx
      sheet: リスト
      description: 各種フラグおよび職種・業種・エリアのリスト
      columns:
        - エージェント利用フラグ
        - 転職時期フラグ
        - 転職活動期間フラグ
        - 応募種別フラグ
        - 学歴フラグ
        - 卒業年月
        - 希望曜日フラグ
        - 希望最大残業フラグ
        - 希望転勤フラグ
        - 自動車免許フラグ
        - 語学フラグ
        - 語学スキルフラグ
        - 日本語スキルフラグ
        - PCスキル_タイピングフラグ
        - PCスキル_Excelフラグ
        - PCスキル_Wordフラグ
        - PCスキル_PPTフラグ
        - 応募書類状況フラグ
        - 応募書類サポートフラグ
        - LINE設定フラグ
        - 求人送付フラグ
        - 職種リスト
        - 業種リスト
        - エリア
        - 都道府県
        - 市区
        - カテゴリ_大
        - カテゴリ_中
        - カテゴリ_小
      notes:
        - カテゴリ_大・中・小は退職理由カテゴリ

  validation:
    web_resume_filename_check:
      rule: |
        Web履歴書PDFのファイル名が
        「5から始まる7桁の数字（正規表現 ^5[0-9]{6}）」を
        含んでいることを必ず確認する。
      on_fail:
        action: stop
        dialog:
          title: ファイル名エラー
          message: |
            添付されたWeb履歴書PDFのファイル名が条件を満たしていません。
            【必要な条件】ファイル名に「5から始まる7桁の番号」が含まれていること（例 5123456.pdf）。
            ファイル名を修正のうえ、再度アップロードしてください。
            ※修正が確認できるまで、以降の処理は実行されません。
        retry:
          required: true
          recheck: true

  sheets:
    基本情報シート:
      columns: [エージェント利用フラグ, エージェント利用メモ, 転職時期フラグ, 転職時期メモ, 転職活動期間フラグ, 転職活動期間メモ, 現在応募求人数, 応募種別フラグ, 応募状況メモ, 学歴フラグ, 学歴メモ, 卒業年月, 面談メモ, 希望職種フラグ, 希望職種メモ, 希望業種フラグ, 希望業種メモ, 希望エリアフラグ, 希望_都道府県, 希望_市区, 希望エリアメモ, 現在年収, 希望下限年収, 希望年収, 現年収メモ, 下限年収メモ, 希望年収メモ, 希望曜日フラグ, 希望曜日メモ, 希望最大残業フラグ, 希望最大残業メモ, 希望転勤フラグ, 希望転勤メモ, 自動車免許フラグ, 自動車免許メモ, 語学フラグ, 語学スキルフラグ, 語学スキルメモ, 日本語スキルフラグ, 日本語スキルメモ, PCスキル_タイピングフラグ, PCスキル_タイピングメモ, PCスキル_Excelフラグ, PCスキル_Excelメモ, PCスキル_Wordフラグ, PCスキル_Wordメモ, PCスキル_PPTフラグ, PCスキル_PPTメモ, 応募書類状況フラグ, 応募書類状況メモ, 応募書類サポートフラグ, 応募書類サポートメモ, LINE設定フラグ, LINE設定メモ, 求人送付フラグ, 求人送付予定時期, 求人送付メモ, 次回面談設定フラグ, 次回面談予定日, 次回面談予定時刻, 次回面談予定メモ, フリーメモ, 初回面談まとめ, インポート用照合キー]
      input_rules:
        - 1行目に列名、2行目にデータを入力
        - 応募社数が不明な場合は0、範囲は上限値を入力
        - 卒業年月は「YYYY年3月 卒業」形式
        - 日付は「YYYY/MM/DD」、時刻は「HH:MM」
        - 記載がない項目は空欄可
        - インポート用照合キーは「求職者NO（7桁）＋1」
        - 求職者NOはWeb履歴書PDFのファイル名から抽出する
        - 会話メモやPDF本文内の番号は使用しない

    職歴情報シート:
      columns: [求職者NO, 何社目, 企業名, 事業内容, 在籍期間_年, 在籍期間_ヶ月, 職種フラグ, 職種メモ, 退職理由_大, 退職理由_中, 退職理由_小, 転職理由メモ]
      input_rules:
        - 在籍順に1から連番
        - 職種フラグは職種リストから選択（複数可）
        - 退職理由はカテゴリ_大・中・小から各1つ選択
        - 求職者NOはWeb履歴書PDFのファイル名からのみ取得する
        - 他資料内の番号は一切使用しない

  output:
    formats: [スプレッドシート形式（プレビュー）, Excelファイル形式]
    filenames: [基本情報シート_氏名, 職歴情報シート_氏名]

  procedure:
    - 添付ファイルを読み込む
    - Web履歴書PDFのファイル名を検証する
    - ファイル名が「5から始まる7桁の数字」を含まない場合は処理を中断する
    - エラーダイアログを表示し、ファイル名修正と再アップロードを要求する
    - 再アップロード後、再度ファイル名検証を行う
    - 検証が通過した場合のみ処理を再開する
    - Web履歴書PDFのファイル名から求職者NOを抽出する
    - フラグリストから各フラグ候補を取得する
    - 基本情報シートを作成し、インポート用照合キーを付与する
    - 職歴情報シートを作成し、職歴・退職理由を記入する
    - 指定形式で2シートを出力する
